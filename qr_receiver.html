<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Receiver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0c0f; --panel: #111418; --border: #1e2530;
    --accent: #00e5ff; --accent2: #ff6b35;
    --ok: #00ff88; --warn: #ffcc00; --err: #ff3b5c;
    --text: #c8d8e8; --dim: #4a5a6a;
    --mono: 'Share Tech Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.015) 2px, rgba(0,229,255,0.015) 4px); pointer-events: none; z-index: 100; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 520px; padding: 20px 16px 40px; display: flex; flex-direction: column; gap: 16px; }
  header { text-align: center; padding: 24px 0 8px; }
  .logo { font-family: var(--sans); font-size: 28px; font-weight: 800; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 20px rgba(0,229,255,0.4); }
  .logo span { color: var(--accent2); }
  .subtitle { font-size: 11px; letter-spacing: 0.3em; color: var(--dim); margin-top: 4px; text-transform: uppercase; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .card-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
  .card-header .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); flex-shrink: 0; }
  .cam-wrap { position: relative; width: 100%; aspect-ratio: 1; background: #000; border-radius: 4px; overflow: hidden; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-wrap::before, .cam-wrap::after, .cam-inner::before, .cam-inner::after { content: ''; position: absolute; width: 24px; height: 24px; border-color: var(--accent); border-style: solid; z-index: 10; }
  .cam-wrap::before  { top: 10px; left: 10px;   border-width: 2px 0 0 2px; }
  .cam-wrap::after   { top: 10px; right: 10px;  border-width: 2px 2px 0 0; }
  .cam-inner::before { bottom: 10px; left: 10px;  border-width: 0 0 2px 2px; }
  .cam-inner::after  { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
  .scan-line { position: absolute; left: 10px; right: 10px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); box-shadow: 0 0 10px var(--accent); animation: scan 2s linear infinite; z-index: 11; opacity: 0; transition: opacity 0.3s; }
  .scanning .scan-line { opacity: 1; }
  @keyframes scan { 0% { top: 10px; } 100% { top: calc(100% - 12px); } }
  .flash-overlay { position: absolute; inset: 0; background: rgba(0,229,255,0.25); opacity: 0; pointer-events: none; z-index: 12; transition: opacity 0.05s; }
  .flash-overlay.flash { opacity: 1; }
  .debug-overlay { position: absolute; bottom: 8px; left: 8px; right: 8px; background: rgba(0,0,0,0.75); border-radius: 3px; padding: 4px 8px; font-size: 10px; color: var(--accent); z-index: 13; pointer-events: none; font-family: var(--mono); }
  .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(0,229,255,0.03); border-top: 1px solid var(--border); font-size: 12px; }
  .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); flex-shrink: 0; transition: all 0.2s; }
  .status-indicator.active { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 1s ease infinite; }
  .status-indicator.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .status-indicator.err  { background: var(--err);  box-shadow: 0 0 8px var(--err); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #status-text { flex: 1; }
  .progress-wrap { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .progress-header { display: flex; justify-content: space-between; font-size: 12px; }
  .progress-label { color: var(--dim); }
  .progress-count { color: var(--accent); font-weight: bold; }
  .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--ok)); border-radius: 3px; transition: width 0.3s; }
  .frame-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(26px, 1fr)); gap: 3px; padding: 14px; max-height: 120px; overflow-y: auto; }
  .frame-cell { aspect-ratio: 1; border-radius: 3px; background: var(--border); transition: background 0.2s; }
  .frame-cell.received { background: var(--ok); box-shadow: 0 0 5px rgba(0,255,136,0.5); }
  .log-area { font-size: 11px; line-height: 1.7; color: var(--dim); padding: 10px 14px; max-height: 130px; overflow-y: auto; scrollbar-width: thin; }
  .log-ok   { color: var(--ok); }
  .log-warn { color: var(--warn); }
  .log-err  { color: var(--err); }
  .log-info { color: var(--accent); }
  .btn-row { display: flex; gap: 10px; padding: 14px; padding-top: 0; }
  .btn { flex: 1; padding: 11px 8px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.05); }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
  .btn-primary:hover { background: #33ecff; color: #000; }
  .btn-ok { background: var(--ok); color: #000; border-color: var(--ok); font-weight: bold; }
  .btn-danger { border-color: var(--err); color: var(--err); }
  .complete-banner { display: none; background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,229,255,0.1)); border: 1px solid var(--ok); border-radius: 6px; padding: 20px; text-align: center; gap: 12px; flex-direction: column; align-items: center; }
  .complete-banner.show { display: flex; }
  .complete-icon { font-size: 40px; filter: drop-shadow(0 0 12px var(--ok)); }
  .complete-title { font-family: var(--sans); font-size: 20px; font-weight: 800; color: var(--ok); }
  .complete-meta { font-size: 11px; color: var(--dim); line-height: 1.8; }
  canvas { display: none; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">QR <span>RX</span></div>
    <div class="subtitle">File Transfer Receiver — v1.1</div>
  </header>

  <div class="card">
    <div class="card-header"><span class="dot"></span>摄像头扫描</div>
    <div style="padding:10px">
      <div class="cam-wrap scanning" id="camWrap">
        <div class="cam-inner"></div>
        <video id="video" playsinline autoplay muted></video>
        <div class="scan-line"></div>
        <div class="flash-overlay" id="flashOverlay"></div>
        <div class="debug-overlay" id="debugOverlay">等待启动…</div>
      </div>
      <canvas id="canvas"></canvas>
      <canvas id="canvas2"></canvas>
    </div>
    <div class="status-bar">
      <div class="status-indicator" id="statusDot"></div>
      <div id="status-text">点击启动摄像头</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn" onclick="startCamera()">▶ 启动摄像头</button>
      <button class="btn btn-danger" id="stopBtn" onclick="stopCamera()" disabled>■ 停止</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="dot"></span>接收进度</div>
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">已接收帧数</span>
        <span class="progress-count" id="progressCount">0 / —</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="frame-grid" id="frameGrid"></div>
  </div>

  <div class="complete-banner" id="completeBanner">
    <div class="complete-icon">✦</div>
    <div class="complete-title">传输完成</div>
    <div class="complete-meta" id="completeMeta"></div>
    <button class="btn btn-ok" onclick="downloadFile()">⬇ 下载还原文件</button>
    <button class="btn" onclick="resetAll()" style="margin-top:4px">↺ 重新接收</button>
  </div>

  <div class="card">
    <div class="card-header"><span class="dot"></span>日志</div>
    <div class="log-area" id="logArea"></div>
    <div class="btn-row">
      <button class="btn" onclick="resetAll()">↺ 重置</button>
      <button class="btn" onclick="document.getElementById('logArea').innerHTML=''">清除日志</button>
    </div>
  </div>
</div>

<script>
// 动态加载jsQR，多CDN备用
(function() {
  var cdns = [
    'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',
    'https://unpkg.com/jsqr@1.4.0/dist/jsQR.js',
    'https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js'
  ];
  var idx = 0;
  function tryLoad() {
    if (idx >= cdns.length) {
      document.getElementById('status-text').textContent = 'jsQR加载失败，请检查网络';
      return;
    }
    var s = document.createElement('script');
    s.src = cdns[idx++];
    s.onload = function() {
      var logArea = document.getElementById('logArea');
      if (logArea) {
        var line = document.createElement('div');
        line.className = 'log-ok';
        line.textContent = '[系统] jsQR 已加载 ✓ (来源: ' + s.src.split('/')[2] + ')';
        logArea.appendChild(line);
      }
    };
    s.onerror = tryLoad;
    document.head.appendChild(s);
  }
  tryLoad();
})();
</script>
<script>
const state = {
  total: null, frames: {}, receivedCount: 0,
  scanning: false, stream: null, rafId: null,
  lastDecoded: null, lastDecodedTime: 0,
  scanCount: 0, decodeCount: 0,
};

const video         = document.getElementById('video');
const canvas        = document.getElementById('canvas');
const canvas2       = document.getElementById('canvas2');
const ctx           = canvas.getContext('2d');
const ctx2          = canvas2.getContext('2d');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('status-text');
const progressFill  = document.getElementById('progressFill');
const progressCount = document.getElementById('progressCount');
const frameGrid     = document.getElementById('frameGrid');
const logArea       = document.getElementById('logArea');
const flashOverlay  = document.getElementById('flashOverlay');
const completeBanner= document.getElementById('completeBanner');
const completeMeta  = document.getElementById('completeMeta');
const startBtn      = document.getElementById('startBtn');
const stopBtn       = document.getElementById('stopBtn');
const debugOverlay  = document.getElementById('debugOverlay');

function log(msg, type='') {
  const ts = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  if (type) line.className = 'log-' + type;
  line.textContent = `[${ts}] ${msg}`;
  logArea.appendChild(line);
  logArea.scrollTop = logArea.scrollHeight;
}

async function startCamera() {
  if (typeof jsQR === 'undefined') {
    log('jsQR 未加载，请检查网络', 'err');
    setStatus('库加载失败', 'err');
    return;
  }
  log('jsQR 库已就绪 ✓', 'ok');
  setStatus('请求摄像头权限…', '');
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    video.srcObject = state.stream;
    await video.play();
    const s = state.stream.getVideoTracks()[0].getSettings();
    log(`摄像头已启动 ${s.width}x${s.height}`, 'info');
    state.scanning = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus('扫描中… 对准 QR 码', 'active');
    scheduleScan();
  } catch (e) {
    setStatus('摄像头失败: ' + e.message, 'err');
    log('错误: ' + e.message, 'err');
  }
}

function stopCamera() {
  state.scanning = false;
  if (state.rafId) clearTimeout(state.rafId);
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
  video.srcObject = null;
  startBtn.disabled = false; stopBtn.disabled = true;
  setStatus('已停止', '');
  log('扫描停止', 'warn');
}

function scheduleScan() {
  if (!state.scanning) return;
  state.rafId = setTimeout(() => { scanFrame(); scheduleScan(); }, 200);
}

function tryDecode(imgData, w, h) {
  return jsQR(imgData.data, w, h, { inversionAttempts: 'dontInvert' });
}

function scanFrame() {
  if (!state.scanning || video.readyState !== video.HAVE_ENOUGH_DATA) return;
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;

  canvas.width = vw; canvas.height = vh;
  ctx.drawImage(video, 0, 0, vw, vh);
  state.scanCount++;

  let result = null;

  // 策略1：全图
  result = tryDecode(ctx.getImageData(0, 0, vw, vh), vw, vh);

  // 策略2：裁中心80%
  if (!result) {
    const cx = Math.floor(vw*0.1), cy = Math.floor(vh*0.1);
    const cw = Math.floor(vw*0.8), ch = Math.floor(vh*0.8);
    canvas2.width = cw; canvas2.height = ch;
    ctx2.drawImage(canvas, cx, cy, cw, ch, 0, 0, cw, ch);
    result = tryDecode(ctx2.getImageData(0, 0, cw, ch), cw, ch);
  }

  // 策略3：二值化增强对比度
  if (!result) {
    const id = ctx.getImageData(0, 0, vw, vh);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
      d[i] = d[i+1] = d[i+2] = g > 128 ? 255 : 0;
    }
    result = jsQR(d, vw, vh, { inversionAttempts: 'dontInvert' });
  }

  // 策略4：attemptBoth（处理反色情况）
  if (!result) {
    result = jsQR(ctx.getImageData(0, 0, vw, vh).data, vw, vh, { inversionAttempts: 'attemptBoth' });
  }

  debugOverlay.textContent = `扫描: ${state.scanCount} | 识别: ${state.decodeCount} | ${vw}x${vh}`;

  if (!result) return;

  const raw = result.data;
  const now = Date.now();
  if (raw === state.lastDecoded && now - state.lastDecodedTime < 1200) return;
  state.lastDecoded = raw; state.lastDecodedTime = now; state.decodeCount++;
  processFrame(raw);
}

function processFrame(raw) {
  const m = raw.match(/^\[(\d+)\/(\d+)\]\n/);
  if (!m) { log(`跳过: ${raw.slice(0,25)}`, 'warn'); return; }

  const idx = parseInt(m[1]), total = parseInt(m[2]);
  const content = raw.slice(m[0].length);

  if (state.total === null) {
    state.total = total;
    initFrameGrid(total);
    log(`总帧数: ${total}`, 'info');
  }
  if (state.frames[idx] !== undefined) return;

  state.frames[idx] = content;
  state.receivedCount++;
  flash();
  updateFrameCell(idx);
  updateProgress();
  setStatus(`已接收 ${state.receivedCount} / ${state.total}`, 'active');
  log(`✓ ${idx}/${total}`, 'ok');
  if (state.receivedCount === state.total) onComplete();
}

function onComplete() {
  stopCamera();
  log('全部帧收齐！', 'ok');
  let b85 = '';
  for (let i = 1; i <= state.total; i++) b85 += state.frames[i];
  window._b85data = b85;
  completeBanner.classList.add('show');
  completeMeta.innerHTML = `总帧数: <b>${state.total}</b> | 数据: <b>${b85.length}</b> 字符`;
}

async function downloadFile() {
  const b85 = window._b85data; if (!b85) return;
  try {
    log('Base85 解码…', 'info');
    const compressed = base85Decode(b85);
    log(`压缩包: ${compressed.length} 字节`, 'info');
    const decompressed = await gunzip(compressed);
    const text = new TextDecoder('utf-8').decode(decompressed);
    log(`还原: ${text.length} 字符`, 'ok');
    const first = text.slice(0,200);
    let fn = 'output.txt';
    if (first.includes('def ') || first.includes('import ') || first.includes('class ')) fn = 'output.py';
    else if (first.includes('<!DOCTYPE') || first.includes('<html')) fn = 'output.html';
    else if (first.startsWith('{') || first.startsWith('[')) fn = 'output.json';
    const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
    const a = Object.assign(document.createElement('a'), {href: URL.createObjectURL(blob), download: fn});
    a.click(); URL.revokeObjectURL(a.href);
    log(`下载: ${fn}`, 'ok');
  } catch(e) { log('解码失败: '+e.message, 'err'); }
}

async function gunzip(bytes) {
  const ds = new DecompressionStream('gzip');
  const w = ds.writable.getWriter(); w.write(bytes); w.close();
  const r = ds.readable.getReader(); const chunks = [];
  for(;;){const{done,value}=await r.read();if(done)break;chunks.push(value);}
  const total=chunks.reduce((s,c)=>s+c.length,0); const out=new Uint8Array(total);
  let off=0; for(const c of chunks){out.set(c,off);off+=c.length;} return out;
}

function base85Decode(str) {
  const cs = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!#$%&()*+-;<=>?@^_`{|}~';
  const map = {}; for(let i=0;i<cs.length;i++) map[cs[i]]=i;
  str = str.split('').filter(c=>map[c]!==undefined).join('');
  const bytes = [];
  for(let i=0;i<str.length;i+=5){
    const chunk=str.slice(i,i+5); let val=0;
    for(const ch of chunk) val=val*85+map[ch];
    const bc=chunk.length===5?4:chunk.length-1; const buf=[];
    for(let j=0;j<4;j++){buf.unshift(val&0xff);val>>=8;}
    bytes.push(...buf.slice(0,bc));
  }
  return new Uint8Array(bytes);
}

function setStatus(msg, type) {
  statusText.textContent = msg;
  statusDot.className = 'status-indicator' + (type ? ' '+type : '');
}
function flash() { flashOverlay.classList.add('flash'); setTimeout(()=>flashOverlay.classList.remove('flash'),80); }
function initFrameGrid(n) {
  frameGrid.innerHTML='';
  for(let i=1;i<=n;i++){
    const c=document.createElement('div'); c.className='frame-cell'; c.id=`cell-${i}`; frameGrid.appendChild(c);
  }
}
function updateFrameCell(idx) { const c=document.getElementById(`cell-${idx}`); if(c) c.classList.add('received'); }
function updateProgress() {
  const pct=state.total?(state.receivedCount/state.total*100):0;
  progressFill.style.width=pct+'%';
  progressCount.textContent=`${state.receivedCount} / ${state.total||'—'}`;
}
function resetAll() {
  stopCamera();
  Object.assign(state,{total:null,frames:{},receivedCount:0,lastDecoded:null,lastDecodedTime:0,scanCount:0,decodeCount:0});
  window._b85data=null; frameGrid.innerHTML='';
  progressFill.style.width='0%'; progressCount.textContent='0 / —';
  completeBanner.classList.remove('show'); debugOverlay.textContent='已重置';
  setStatus('已重置',''); log('─── 重置 ───','info');
}

log('QR Receiver v1.1 已加载', 'info');
</script>
</body>
</html>
